<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Safety Star | Online Safety Hero</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #1E5F7A;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 950px;
            width: 100%;
            background: #FFFBF0;
            border-radius: 56px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 5px solid #F4C542;
        }

        .game-header {
            background: #F4C542;
            padding: 18px 25px 12px 25px;
            text-align: center;
            border-bottom: 5px solid #E67E22;
        }

        .game-header h1 {
            margin: 0;
            font-size: 1.9rem;
            color: #1E3B4F;
            font-weight: 800;
        }

        .game-header p {
            font-size: 1rem;
            background: #1E3B4F;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 40px;
            color: #F4C542;
            margin-top: 10px;
            font-weight: bold;
        }

        .game-content {
            padding: 25px 28px 30px;
        }

        .npc-area {
            background: #E9F3F8;
            border-radius: 48px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 3px white, 0 8px 15px rgba(0, 0, 0, 0.05);
        }

        .npc-name {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #1E5A7A;
            margin-bottom: 10px;
        }

        .npc-name span {
            background: #F4C542;
            border-radius: 50px;
            padding: 4px 14px;
            font-size: 0.85rem;
            color: #2C3E50;
        }

        .npc-speech {
            background: white;
            border-radius: 40px;
            padding: 18px 22px;
            font-size: 1.25rem;
            font-weight: 500;
            color: #1F3A4B;
            border-left: 14px solid #E67E22;
            word-break: break-word;
            line-height: 1.4;
        }

        .intent-box {
            background: #FFF2E0;
            border-radius: 32px;
            padding: 16px 22px;
            margin-bottom: 25px;
            border-left: 10px solid #E67E22;
        }

        .intent-title {
            font-weight: bold;
            font-size: 1.2rem;
            color: #C45C1A;
            margin-bottom: 8px;
        }

        .intent-text {
            font-size: 1rem;
            line-height: 1.45;
            color: #2d3e40;
            background: #FFFCF5;
            padding: 12px 18px;
            border-radius: 28px;
        }

        .choices-area {
            margin: 15px 0 15px;
        }

        .choices-label {
            font-weight: bold;
            font-size: 1.2rem;
            color: #2C5F8A;
            margin-bottom: 12px;
        }

        .buttons-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .game-btn {
            background: #F4C542;
            border: none;
            font-size: 0.95rem;
            font-weight: bold;
            padding: 12px 14px;
            border-radius: 60px;
            color: #2C3E50;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 4px 0 #B7621A;
            font-family: inherit;
            flex: 1 0 auto;
            min-width: 140px;
            text-align: center;
        }

        .game-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #B7621A;
        }

        .game-btn.correct-style {
            background: #2E8B57;
            color: white;
            box-shadow: 0 4px 0 #1E5A3A;
        }

        .game-btn.wrong-style {
            background: #CD5C5C;
            color: white;
            box-shadow: 0 4px 0 #8B3A3A;
        }

        .reset-btn {
            background: #577590;
            color: white;
            box-shadow: 0 4px 0 #2F4858;
            margin-top: 15px;
            width: 100%;
        }

        .next-btn {
            background: #2E8B57;
            color: white;
            box-shadow: 0 4px 0 #1E5A3A;
            margin-top: 12px;
            width: 100%;
            display: none;
        }

        .feedback {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            background: #FDF4DC;
            border-radius: 50px;
            padding: 12px 14px;
            font-size: 0.95rem;
            color: #2D6A4F;
            border: 1px solid #F4C542;
        }

        .score-area {
            display: flex;
            justify-content: space-between;
            background: #FFF1DF;
            padding: 10px 22px;
            border-radius: 60px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #1E6091;
            border: 1px solid #F4C542;
        }

        /* Hide the question number span completely */
        .question-number {
            display: none;
        }

        @media (max-width: 650px) {
            .game-content {
                padding: 16px;
            }
            .npc-speech {
                font-size: 1rem;
            }
            .buttons-grid {
                flex-direction: column;
            }
            .game-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <h1>Safety Star</h1>
        <p>Learn to be safe online</p>
    </div>
    <div class="game-content">
        <div class="score-area">
            <span>Points: <span id="scoreValue">0</span></span>
            <!-- Question number removed from top right corner -->
        </div>

        <div class="npc-area">
            <div class="npc-name">
                Helper Bear <span>(friend)</span>
            </div>
            <div class="npc-speech" id="npcMessage">
                "Let's learn online safety!"
            </div>
        </div>

        <div class="intent-box" id="intentBox">
            <div class="intent-title">
                What is the SAFEST thing to do?
            </div>
            <div class="intent-text" id="intentText">
                Read the situation. Pick the best answer. Then we will explain why.
            </div>
        </div>

        <div class="choices-area">
            <div class="choices-label">
                Pick one:
            </div>
            <div class="buttons-grid" id="choicesContainer">
                <!-- options will be added here -->
            </div>
        </div>

        <button class="reset-btn" id="resetGameBtn">Play Again</button>
        <button class="next-btn" id="nextRoundBtn">Next Question</button>
        <div class="feedback" id="feedbackMsg">
            Read each question. Choose the safest answer.
        </div>
    </div>
</div>

<script>
    // 10 online safety questions - short, clear, no emojis
    const questions = [
        {
            text: "A game asks for your real name and address to send you a prize. What do you do?",
            options: [
                "Give the info to get the prize",
                "Ask a parent first",
                "Type a fake name",
                "Ignore it but keep playing"
            ],
            correctIndex: 1,
            explanation: "Always ask a parent before sharing real name or address online. Strangers do not need that info.",
            correctMsg: "Great job! Asking a parent keeps you safe.",
            wrongMsgs: {
                0: "Giving your real address to a game could be a trick. Ask a parent first.",
                2: "Lying is not the best choice. It is better to ask a parent for help.",
                3: "Ignoring is okay, but telling a parent is even safer."
            }
        },
        {
            text: "Someone you don't know sends you a friend request. What is safest?",
            options: [
                "Accept, more friends = more fun",
                "Accept but block them later",
                "Decline and tell a parent",
                "Ask them questions first"
            ],
            correctIndex: 2,
            explanation: "Only accept friend requests from people you know in real life. Strangers can be dangerous.",
            correctMsg: "Perfect! Only add real friends. Tell a parent about strangers.",
            wrongMsgs: {
                0: "Adding strangers is risky. They might not be who they say they are.",
                1: "Accepting then blocking is still risky. Best to just decline and tell a parent.",
                3: "Asking questions is not safe. Strangers can lie. Decline and tell an adult."
            }
        },
        {
            text: "Your online friend asks for your password to 'help' you. What do you say?",
            options: [
                "Sure, here is my password",
                "No, passwords are secret",
                "Only give half the password",
                "Ask what they need it for"
            ],
            correctIndex: 1,
            explanation: "Never share your password with anyone except your parents. Real friends don't ask for passwords.",
            correctMsg: "Excellent! Keep passwords secret. That protects your account.",
            wrongMsgs: {
                0: "Never share your password. That person could lock you out of your account.",
                2: "Giving any part of your password is unsafe. Just say NO.",
                3: "Asking why is okay, but still do not share. The safest answer is NO."
            }
        },
        {
            text: "You see something online that makes you feel scared or sad. What should you do?",
            options: [
                "Keep watching alone",
                "Tell a parent or teacher",
                "Send it to a friend",
                "Close it and forget"
            ],
            correctIndex: 1,
            explanation: "Always tell a trusted adult when something online bothers you. They can help you feel better.",
            correctMsg: "So smart! Telling an adult is always the right choice.",
            wrongMsgs: {
                0: "Watching alone can make you feel worse. Tell an adult right away.",
                2: "Sending to a friend might scare them too. Tell a parent instead.",
                3: "Closing it is good, but telling an adult is even better so they can help."
            }
        },
        {
            text: "A stranger messages you saying, 'You are so cool! Send me a picture of yourself.' What is safest?",
            options: [
                "Send a picture to be nice",
                "Say no and block them",
                "Send a picture of my pet",
                "Ask why they want it"
            ],
            correctIndex: 1,
            explanation: "Never send photos to strangers. Block them and tell a parent. Real friends don't ask for pictures.",
            correctMsg: "Perfect! Block strangers who ask for photos. You stayed safe!",
            wrongMsgs: {
                0: "Never send your photo to a stranger. They could use it badly.",
                2: "Even a pet photo is not safe with a stranger. Just say no and block.",
                3: "Do not talk to strangers online. Block and tell a parent."
            }
        },
        {
            text: "You play games for 3 hours and feel tired. What is the best choice?",
            options: [
                "Keep playing all night",
                "Take a break and rest",
                "Play one more hour",
                "Get snacks and keep going"
            ],
            correctIndex: 1,
            explanation: "Taking breaks is healthy for your eyes, body, and brain. Balance is important for online safety too.",
            correctMsg: "Great job! Taking breaks keeps you healthy and happy.",
            wrongMsgs: {
                0: "Playing too much can make you tired and sick. Take breaks.",
                1: "One more hour still means no break. Rest your eyes and body.",
                3: "Snacks do not fix tiredness. Take a real break from screens."
            }
        },
        {
            text: "Someone online says mean things to you. What should you do?",
            options: [
                "Say mean things back",
                "Cry and say nothing",
                "Tell a parent and block them",
                "Ignore and keep talking"
            ],
            correctIndex: 2,
            explanation: "Tell a parent right away when someone is mean. Block them. You don't have to face it alone.",
            correctMsg: "You did the bravest thing! Telling a parent stops the meanness.",
            wrongMsgs: {
                0: "Being mean back makes things worse. Tell an adult instead.",
                1: "Crying alone is sad. You deserve help. Tell a parent.",
                3: "Ignoring is okay, but telling a parent is safer. They can help stop it."
            }
        },
        {
            text: "A website asks for your phone number to 'verify your age.' What is safest?",
            options: [
                "Type my real number",
                "Type a fake number",
                "Ask a parent first",
                "Close the website"
            ],
            correctIndex: 2,
            explanation: "Never give your phone number online without a parent. Some websites collect numbers to call or text you.",
            correctMsg: "Smart choice! Parents help decide what is safe to share.",
            wrongMsgs: {
                0: "Do not give your real number to websites. They might call or text you with tricks.",
                1: "Lying is not the best. Just ask a parent before sharing anything.",
                3: "Closing is fine, but telling a parent is even better so they know."
            }
        },
        {
            text: "You want to make a strong password. Which one is safest?",
            options: [
                "123456",
                "password",
                "MyName2024",
                "Tiger9Lemon7"
            ],
            correctIndex: 3,
            explanation: "A strong password has letters, numbers, and symbols. It is hard for others to guess. Keep it secret.",
            correctMsg: "Excellent! That is a super strong password. You are a password pro.",
            wrongMsgs: {
                0: "123456 is too easy to guess. Scammers can break in fast.",
                1: "'password' is the most common weak password. Pick something harder.",
                2: "Using your name is easy to guess. Add numbers and symbols to make it strong."
            }
        },
        {
            text: "A friend shares a secret about another kid online. What should you do?",
            options: [
                "Share it with more people",
                "Keep the secret forever",
                "Tell a trusted adult",
                "Ask the friend to stop"
            ],
            correctIndex: 2,
            explanation: "If a secret could hurt someone, tell an adult. Some secrets are not safe to keep, especially online.",
            correctMsg: "You are a good friend! Telling an adult helps everyone stay safe.",
            wrongMsgs: {
                0: "Sharing secrets online can hurt feelings. Tell an adult instead.",
                1: "Some secrets are not safe to keep. If someone could get hurt, tell an adult.",
                3: "Asking to stop is good, but telling an adult is even safer."
            }
        }
    ];

    let currentQ = 0;
    let score = 0;
    let gameActive = true;
    let questionAnswered = false;
    let nextButton = document.getElementById("nextRoundBtn");
    const npcMessageEl = document.getElementById("npcMessage");
    const intentTextEl = document.getElementById("intentText");
    const scoreSpan = document.getElementById("scoreValue");
    const feedbackMsgEl = document.getElementById("feedbackMsg");
    const choicesContainer = document.getElementById("choicesContainer");
    const resetBtn = document.getElementById("resetGameBtn");

    function renderOptions() {
        const q = questions[currentQ];
        choicesContainer.innerHTML = "";
        q.options.forEach((option, idx) => {
            const btn = document.createElement("button");
            btn.textContent = option;
            btn.className = "game-btn";
            btn.dataset.index = idx;
            btn.addEventListener("click", () => onChoice(idx));
            choicesContainer.appendChild(btn);
        });
    }

    function updateUIForCurrent() {
        if (!gameActive) {
            npcMessageEl.innerHTML = "Congratulations! You finished all 10 safety questions.";
            intentTextEl.innerHTML = "Final score: " + score + " out of " + questions.length + ". You are a Safety Star! Keep using what you learned.";
            choicesContainer.innerHTML = "<div style='text-align:center; padding:15px; background:#FFF2DF; border-radius:40px;'>Game complete. Press Play Again to practice more.</div>";
            nextButton.style.display = "none";
            return;
        }

        const q = questions[currentQ];
        npcMessageEl.innerHTML = q.text;
        intentTextEl.innerHTML = "Choose the SAFEST answer. Then we will explain why it is safe.";
        questionAnswered = false;
        nextButton.style.display = "none";
        scoreSpan.innerText = score;
        feedbackMsgEl.innerHTML = "Read carefully. Pick the best answer to earn points.";
        
        renderOptions();
    }

    function disableChoiceButtons(disabled) {
        const btns = document.querySelectorAll("#choicesContainer .game-btn");
        btns.forEach(btn => {
            btn.disabled = disabled;
        });
    }

    function highlightCorrectAndWrong(selectedIndex, isCorrect) {
        const btns = document.querySelectorAll("#choicesContainer .game-btn");
        const q = questions[currentQ];
        const correctIdx = q.correctIndex;
        
        btns.forEach((btn, idx) => {
            if (idx === correctIdx) {
                btn.classList.add("correct-style");
            } else if (idx === selectedIndex && !isCorrect) {
                btn.classList.add("wrong-style");
            }
        });
    }

    function onChoice(selectedIdx) {
        if (!gameActive || questionAnswered) return;
        
        const q = questions[currentQ];
        const isCorrect = (selectedIdx === q.correctIndex);
        let outcomeMsg = "";
        
        if (isCorrect) {
            score++;
            outcomeMsg = q.correctMsg;
            feedbackMsgEl.innerHTML = "CORRECT: " + outcomeMsg + " +1 point!";
        } else {
            const wrongMsg = q.wrongMsgs[selectedIdx];
            outcomeMsg = wrongMsg || "That is not the safest choice. Let's learn the safe way.";
            feedbackMsgEl.innerHTML = "NOT QUITE: " + outcomeMsg;
        }
        
        scoreSpan.innerText = score;
        intentTextEl.innerHTML = "SAFETY RULE: " + q.explanation;
        
        questionAnswered = true;
        disableChoiceButtons(true);
        
        highlightCorrectAndWrong(selectedIdx, isCorrect);
        
        if (currentQ + 1 === questions.length) {
            nextButton.innerText = "Finish";
            nextButton.style.display = "block";
        } else {
            nextButton.innerText = "Next Question";
            nextButton.style.display = "block";
        }
    }
    
    function goToNext() {
        if (!gameActive) return;
        if (!questionAnswered) {
            feedbackMsgEl.innerHTML = "Please choose an answer first, then press Next Question.";
            return;
        }
        
        if (currentQ + 1 < questions.length) {
            currentQ++;
            updateUIForCurrent();
        } 
        else if (currentQ + 1 === questions.length) {
            gameActive = false;
            npcMessageEl.innerHTML = "You did it! You learned how to stay safe online.";
            intentTextEl.innerHTML = "Final Score: " + score + " out of " + questions.length + ". You are a Safety Star! Remember: ask parents, keep passwords secret, and be kind.";
            choicesContainer.innerHTML = "<div style='text-align:center; padding:15px; background:#E0F2E9; border-radius:40px;'>Amazing work! Press Play Again to practice more safety tips.</div>";
            nextButton.style.display = "none";
            scoreSpan.innerText = score;
            feedbackMsgEl.innerHTML = "You are a safety expert! Press Play Again to keep learning.";
        }
    }
    
    function resetGame() {
        currentQ = 0;
        score = 0;
        gameActive = true;
        questionAnswered = false;
        
        updateUIForCurrent();
        nextButton.style.display = "none";
        feedbackMsgEl.innerHTML = "Game reset. Read each question and pick the safest answer.";
        scoreSpan.innerText = "0";
    }

    function bindEvents() {
        nextButton.onclick = goToNext;
        resetBtn.onclick = resetGame;
    }
    
    bindEvents();
    updateUIForCurrent();
</script>
</body>
</html>
